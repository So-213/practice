# Spring Boot アプリケーション設定
spring.application.name=hello-springboot

# サーバーポート（デフォルト3000）
server.port=3000

# Thymeleaf キャッシュ無効（開発時）
spring.thymeleaf.cache=false

# PostgreSQL (practice-springboot)
spring.datasource.url=jdbc:postgresql://localhost:5432/practice-springboot
spring.datasource.username=kayanuma
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway マイグレーション
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
